          tech_start = s.index('## 🛠 Tech Stack')
          exp_start = s.index('## Experience')
          s = s[:tech_start] + tech + s[exp_start:]

          # Move AI Competition above Tech Stack if needed
          ai = '## AI Competition'
          tech_marker = '## 🛠 Tech Stack'
          exp = '## Experience'
          ai_start = s.index(ai)
          tech_start = s.index(tech_marker)
          exp_start = s.index(exp)
          if tech_start < ai_start:
              tech_block = s[tech_start:ai_start]
              ai_block = s[ai_start:exp_start]
              s = s[:tech_start] + ai_block + tech_block + s[exp_start:]

          path.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "No README changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update profile tech stack from portfolio skills"
          git push
