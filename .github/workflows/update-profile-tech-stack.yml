name: update-profile-tech-stack

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-profile-tech-stack.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update README tech stack from portfolio skills
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('README.md')
          s = path.read_text(encoding='utf-8')

          # Add personal DACON repo link if missing
          own_repo = '  - <a href="https://github.com/KDY0829/dacon-data-segmentation_and_train">KDY0829/dacon-data-segmentation_and_train</a><br />'
          org_repo = '  - <a href="https://github.com/Dacon-contest">GitHub Organization</a>'
          if own_repo not in s and org_repo in s:
              s = s.replace(org_repo, own_repo + '\n' + org_repo)

          tech = '''## 🛠 Tech Stack

